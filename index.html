<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaku Reports</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', -apple-system, sans-serif;
    background: #0a0a0a;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { max-width: 600px; padding: 40px; }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .sub { color: #999; margin-bottom: 40px; }
  .report-list { list-style: none; }
  .report-list li { margin-bottom: 16px; }
  .report-list a {
    display: block;
    padding: 20px 24px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    color: #818cf8;
    text-decoration: none;
    font-size: 16px;
    transition: all 0.2s;
  }
  .report-list a:hover {
    background: #1e1e1e;
    border-color: #6366f1;
    transform: translateY(-2px);
  }
  .report-list .date { color: #666; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>Gaku Reports</h1>
  <p class="sub">レポート一覧</p>
  <ul class="report-list">
    <li>
      <a href="lp-patterns-guide/">
        LP構成パターン完全ガイド — 通販D2C編
        <div class="date">2026-03-04 / 17スライド / 通販LP 50件分析</div>
      </a>
    </li>
  </ul>
</div>
</body>
</html>
